name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, synchronize, reopened, assigned]

jobs:
  claude:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude[bot]') ||
        (github.event_name == 'pull_request' && github.event.action == 'assigned' && github.event.assignee.login == 'claude[bot]')
      ) && (
        !github.event.issue.pull_request || github.event.issue.state == 'open'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          custom_instructions: |
            When reviewing PRs, follow these rules:

            OUTPUT RULES:
            - Report ONLY actionable findings (things that need to change)
            - Do NOT list files/functions that are correct — no "clean" confirmations
            - Do NOT write "General pass — no new findings" followed by a list of clean items
            - If everything is clean, just say "No issues found" and stop
            - Categorize findings as Critical, Important, or Minor
            - NEVER dismiss a finding as "acceptable", "carry-over", or "MVP-acceptable"
            - If an issue exists, report it with severity — the fix loop decides priority
            - Performance issues (N+1 queries, sequential where parallel is possible) are Important
            - End with a verdict: PASS, PASS_WITH_CONCERNS, or FAIL

            RE-REVIEW RULES (when previous review comments exist on the PR):
            - Check if previously flagged findings have been resolved
            - Report only: (1) findings that are STILL unresolved, (2) NEW findings
            - Do NOT re-report findings that were fixed
            - If all previous findings are resolved and no new ones, verdict is PASS

            Be concise. Findings only. No filler.

      # Post a signal comment AFTER the action completes.
      # The action edits its own comment to add "Claude finished", but
      # issue_comment:created already fired (with just the checklist).
      # This new comment triggers claude-review-fix.yml.
      # MUST use GH_PAT — GITHUB_TOKEN comments can't trigger other workflows.
      - name: Signal review complete
        if: success() && github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '[claude-review-complete] Claude finished reviewing this PR.'
            });
