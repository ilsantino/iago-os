name: Claude Review Fix Loop

# Triggered by the [claude-review-complete] signal comment posted by
# claude.yml after the Claude Code Action finishes.
#
# The Claude Code Action edits its own comment (checklist → "Claude finished"),
# but issue_comment:created fires only once — when the checklist is first
# posted, before "Claude finished" exists. So claude.yml posts a separate
# signal comment via GH_PAT after the action completes.
#
# Loop: claude.yml (review + signal) → this (fix) → tag @claude → claude.yml
# Breaks when: review is clean, or max 5 rounds.

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    # Trigger on the signal comment posted by claude.yml after review completes.
    # This is a separate comment from the Claude Code Action's own review comment.
    if: |
      github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      contains(github.event.comment.body, '[claude-review-complete]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check for findings and round limit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_ROUNDS = 5;
            const prNumber = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('head_ref', pr.head.ref);

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // The trigger is [claude-review-complete] (signal comment).
            // The actual review is in the most recent claude[bot] comment.
            const claudeComments = comments.data.filter(c =>
              c.user.login === 'claude[bot]' &&
              c.body.includes('Claude finished')
            );
            const latestReview = claudeComments.length > 0
              ? claudeComments[claudeComments.length - 1].body.toLowerCase()
              : '';

            const cleanSignals = [
              'no issues found', 'no issues', 'no findings',
              'lgtm', 'looks good', 'no concerns', 'approved',
              'all findings resolved', 'all findings addressed',
              'all issues resolved', 'all issues addressed',
              'nothing to flag', 'no actionable findings',
            ];
            // Check clean signals OR a PASS verdict without Critical/Important findings
            const hasCleanSignal = cleanSignals.some(s => latestReview.includes(s));
            const hasPassVerdict = /verdict[:\s]*\*{0,2}\s*pass\b/i.test(latestReview)
              && !/\*{0,2}critical\*{0,2}/i.test(latestReview)
              && !/\*{0,2}important\*{0,2}/i.test(latestReview);
            const isClean = hasCleanSignal || hasPassVerdict;

            // Also check inline review comments from claude[bot]
            const reviewComments = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const recentInline = reviewComments.data.filter(c =>
              c.user.login === 'claude[bot]' &&
              new Date(c.created_at) > new Date(Date.now() - 10 * 60 * 1000) // last 10 min
            );

            // If clean completion and no inline comments, mark as clean
            if (isClean && recentInline.length === 0) {
              core.info('Review is clean — no fixes needed');
              core.setOutput('skip', 'true');
              core.setOutput('clean', 'true');
              return;
            }

            // Count fix rounds by [review-fix-loop] re-tag comments (any author,
            // since GH_PAT posts as the token owner, not github-actions[bot])
            const retagComments = comments.data.filter(c =>
              c.body.includes('[review-fix-loop]')
            );
            const round = retagComments.length + 1;
            core.info(`Fix round ${round}/${MAX_ROUNDS}, inline findings: ${recentInline.length}`);

            if (round > MAX_ROUNDS) {
              core.setOutput('skip', 'true');
              core.setOutput('max_rounds', 'true');
            } else {
              core.setOutput('skip', 'false');
              core.setOutput('round', round.toString());
            }

      - name: Post max-rounds notice
        if: steps.pr.outputs.skip == 'true' && steps.pr.outputs.max_rounds == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '[review-fix-loop] Max rounds (5) reached. Manual review required.'
            });

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fix review findings
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 50"
          custom_instructions: |
            You are a review-fix agent. Round ${{ steps.pr.outputs.round }}/5.

            TASK: Read the latest claude[bot] review comment on this PR, identify
            every actionable finding (Critical, Important, Minor), and fix ALL of them
            in priority order: Critical first, then Important, then Minor.

            If running low on turns, ensure all Critical and Important findings are
            fixed before attempting Minor ones. Never skip a severity tier entirely.

            WORKFLOW:
            1. Read review comments:
               gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments --jq '.[] | select(.user.login == "claude[bot]") | .body' | tail -1
            2. Extract each finding — look for lines with Critical, Important, or Minor
            3. For each finding:
               a. Read the referenced file
               b. Apply the fix
               c. VERIFY the fix worked — re-read the file and confirm the issue is gone
            4. After all fixes verified, commit and push:
               git add -A
               git commit -m "fix: address review findings (round ${{ steps.pr.outputs.round }})"
               git push

            RULES:
            - Do NOT skip any finding regardless of severity
            - VERIFY each fix before moving on — if the issue persists, try again
            - If a finding was flagged in a previous round and is still present,
              it means your previous fix didn't work. Try a DIFFERENT approach.
            - If you cannot fix something after 2 attempts, explain why in a PR comment
            - Do NOT post a comment tagging @claude — a later step handles that
            - You MUST commit and push even if changes are small

      # Fallback: commit and push any changes the fix agent made but didn't push
      - name: Push remaining changes
        if: steps.pr.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Fix agent left uncommitted changes — pushing them"
            git add -A
            git commit -m "fix: address review findings (round ${{ steps.pr.outputs.round }}) [fallback]"
            git push
          else
            echo "Working tree clean — fix agent already pushed (or made no changes)"
          fi

      # Re-tag @claude using PAT so the comment triggers claude.yml.
      # Default GITHUB_TOKEN can't trigger other workflows (GitHub limitation).
      - name: Tag @claude for re-review
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const round = '${{ steps.pr.outputs.round }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `[review-fix-loop] @claude Review again. Fixes pushed for round ${round}. General pass for anything unexpected.`
            });

      # ─── Clean PR: post summary for human review ─────────────────────
      # When all findings are resolved, checkout the branch and ask Claude
      # to summarize everything that changed across all fix rounds.
      - uses: actions/checkout@v4
        if: steps.pr.outputs.clean == 'true'
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Post review summary
        if: steps.pr.outputs.clean == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 10"
          custom_instructions: |
            The review-fix loop has completed — all findings are resolved.

            Write a PR summary comment for the human reviewer. Use bullet points.
            Keep it concise — the human wants to scan quickly and decide to merge.

            Structure:

            ## Review Summary

            **What this PR does:** (1-2 sentences)

            **What was fixed during review:**
            - (bullet per finding that was corrected across all rounds)
            - (include which file and what changed)

            **Files changed:**
            - `path/to/file.ts` — one-line description
            - (one bullet per file)

            **Verdict:** All findings resolved. Ready for human review and merge.

            To gather context:
            1. Read the PR description: `gh pr view ${{ github.event.issue.number }}`
            2. Read all comments: `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments`
            3. Read the diff: `gh pr diff ${{ github.event.issue.number }}`

            Post the summary as a single, clean comment. No @claude tags.
