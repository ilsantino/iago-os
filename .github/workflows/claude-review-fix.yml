name: Claude Review Fix Loop

# Triggered by the [claude-review-complete] signal comment posted by
# claude.yml after the Claude Code Action finishes.
#
# The Claude Code Action edits its own comment (checklist → "Claude finished"),
# but issue_comment:created fires only once — when the checklist is first
# posted, before "Claude finished" exists. So claude.yml posts a separate
# signal comment via GH_PAT after the action completes.
#
# Loop: claude.yml (review + signal) → this (fix) → tag @claude → claude.yml
# Breaks when: review is clean, or max 5 rounds.

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    # Trigger on the signal comment posted by claude.yml after review completes.
    # This is a separate comment from the Claude Code Action's own review comment.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '[claude-review-complete]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check for findings and round limit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_ROUNDS = 5;
            const prNumber = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('head_ref', pr.head.ref);

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // The trigger is [claude-review-complete] (signal comment).
            // The actual review is in the most recent claude[bot] comment.
            const claudeComments = comments.data.filter(c =>
              c.user.login === 'claude[bot]' &&
              c.body.includes('Claude finished')
            );
            const latestReview = claudeComments.length > 0
              ? claudeComments[claudeComments.length - 1].body.toLowerCase()
              : '';

            const cleanSignals = ['no issues found', 'lgtm', 'looks good', 'no concerns', 'approved', 'no issues'];
            const isClean = cleanSignals.some(s => latestReview.includes(s));

            // Also check inline review comments from claude[bot]
            const reviewComments = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const recentInline = reviewComments.data.filter(c =>
              c.user.login === 'claude[bot]' &&
              new Date(c.created_at) > new Date(Date.now() - 10 * 60 * 1000) // last 10 min
            );

            // If clean completion and no inline comments, skip
            if (isClean && recentInline.length === 0) {
              core.info('Review is clean — no fixes needed');
              core.setOutput('skip', 'true');
              return;
            }

            // Count fix rounds by [review-fix-loop] re-tag comments (any author,
            // since GH_PAT posts as the token owner, not github-actions[bot])
            const retagComments = comments.data.filter(c =>
              c.body.includes('[review-fix-loop]')
            );
            const round = retagComments.length + 1;
            core.info(`Fix round ${round}/${MAX_ROUNDS}, inline findings: ${recentInline.length}`);

            if (round > MAX_ROUNDS) {
              core.setOutput('skip', 'true');
              core.setOutput('max_rounds', 'true');
            } else {
              core.setOutput('skip', 'false');
              core.setOutput('round', round.toString());
            }

      - name: Post max-rounds notice
        if: steps.pr.outputs.skip == 'true' && steps.pr.outputs.max_rounds == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '[review-fix-loop] Max rounds (5) reached. Manual review required.'
            });

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        if: steps.pr.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fix review findings
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 50"
          custom_instructions: |
            You are a review-fix agent. Round ${{ steps.pr.outputs.round }}/5.

            TASK: Read the latest claude[bot] review comment on this PR, identify
            every actionable finding (Critical, Important, Minor), and fix ALL of them.

            WORKFLOW:
            1. Use `gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments` to read the review
            2. Find the most recent claude[bot] comment containing review findings
            3. For each finding: read the referenced file, apply the fix
            4. After all fixes, commit and push:
               git add -A
               git commit -m "fix: address review findings (round ${{ steps.pr.outputs.round }})"
               git push

            RULES:
            - Do NOT skip any finding regardless of severity
            - If you cannot fix something, explain why in a PR comment
            - Do NOT post a comment tagging @claude — a later step handles that
            - You MUST commit and push even if changes are small

      # Fallback: commit and push any changes the fix agent made but didn't push
      - name: Push remaining changes
        if: steps.pr.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Fix agent left uncommitted changes — pushing them"
            git add -A
            git commit -m "fix: address review findings (round ${{ steps.pr.outputs.round }}) [fallback]"
            git push
          else
            echo "Working tree clean — fix agent already pushed (or made no changes)"
          fi

      # Re-tag @claude using PAT so the comment triggers claude.yml.
      # Default GITHUB_TOKEN can't trigger other workflows (GitHub limitation).
      - name: Tag @claude for re-review
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const round = '${{ steps.pr.outputs.round }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `[review-fix-loop] @claude Review again. Fixes pushed for round ${round}. General pass for anything unexpected.`
            });
