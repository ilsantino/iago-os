name: Claude Review Fix Loop

# Triggered by claude[bot] posting review findings on a PR.
# Fixes all findings via Claude Code, pushes, then github-actions[bot]
# tags @claude for another review. This routes back through claude.yml
# (review) instead of re-triggering this workflow.
#
# Loop: claude.yml (review) → findings → this (fix) → tag @claude → claude.yml
# Breaks when: claude[bot] posts clean comment, or max 5 rounds.

on:
  issue_comment:
    types: [created]

jobs:
  fix:
    # Only trigger on Claude's COMPLETION comment — not intermediate findings.
    # Claude Code Action posts "Claude finished" when done. That's our signal.
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'claude[bot]' &&
      contains(github.event.comment.body, 'Claude finished')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Check for findings and round limit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_ROUNDS = 5;
            const prNumber = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('head_ref', pr.head.ref);

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            // Check if Claude's review had actionable findings.
            // The completion comment ("Claude finished") is the trigger,
            // but the actual findings are in other claude[bot] comments.
            const cleanSignals = ['no issues found', 'lgtm', 'looks good', 'no concerns', 'approved', 'no issues'];
            const completionComment = context.payload.comment.body.toLowerCase();
            const isClean = cleanSignals.some(s => completionComment.includes(s));

            // Also check inline review comments from claude[bot]
            const reviewComments = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const recentInline = reviewComments.data.filter(c =>
              c.user.login === 'claude[bot]' &&
              new Date(c.created_at) > new Date(Date.now() - 10 * 60 * 1000) // last 10 min
            );

            // If clean completion and no inline comments, skip
            if (isClean && recentInline.length === 0) {
              core.info('Review is clean — no fixes needed');
              core.setOutput('skip', 'true');
              return;
            }

            // Count fix rounds by github-actions[bot] re-tag comments
            const retagComments = comments.data.filter(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('[review-fix-loop]')
            );
            const round = retagComments.length + 1;
            core.info(`Fix round ${round}/${MAX_ROUNDS}, inline findings: ${recentInline.length}`);

            if (round > MAX_ROUNDS) {
              core.setOutput('skip', 'true');
              core.setOutput('max_rounds', 'true');
            } else {
              core.setOutput('skip', 'false');
              core.setOutput('round', round.toString());
            }

      - name: Post max-rounds notice
        if: steps.pr.outputs.skip == 'true' && steps.pr.outputs.max_rounds == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '[review-fix-loop] Max rounds (5) reached. Manual review required.'
            });

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Fix review findings
        if: steps.pr.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 50"
          custom_instructions: |
            You are a review-fix agent. Round ${{ steps.pr.outputs.round }}/5.

            The last review found issues on this PR. Fix ALL of them.
            Read the review comment, identify every actionable finding, fix the code,
            verify the changes are correct, and push.

            Do NOT skip any finding regardless of severity. If you cannot fix something,
            explain why in a comment instead of silently skipping it.

            Do NOT post a comment tagging @claude — a separate workflow step handles that.

      # Re-tag @claude using PAT so the comment triggers claude.yml.
      # Default GITHUB_TOKEN can't trigger other workflows (GitHub limitation).
      - name: Tag @claude for re-review
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const round = '${{ steps.pr.outputs.round }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `[review-fix-loop] @claude Review again. Fixes pushed for round ${round}. General pass for anything unexpected.`
            });
